<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘運勢占卜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 神秘運勢占卜 🔮</h1>
            <p>點擊下面按鈕，看看今天的運勢如何吧！</p>
        </header>

        <main>
            <button id="fortuneBtn">開始占卜</button>

            <div id="result" class="hidden">
                <h2 id="fortuneType"></h2>
                <p id="fortuneDesc"></p>
                <p id="fortuneEnding"></p>
                <button id="retryBtn">再占卜一次</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
